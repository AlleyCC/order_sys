# Testcontainers will set datasource URL dynamically
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# MyBatis-Plus
mybatis-plus.mapper-locations=classpath:mapper/**/*.xml
mybatis-plus.configuration.map-underscore-to-camel-case=true

# Token
app.token.access-expires-seconds=900
app.token.refresh-expires-days=7

# Redis (overridden by @DynamicPropertySource in tests)
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Disable auto-settlement scheduler in tests
app.scheduler.enabled=false

# JWT / RSA key paths (relative to project root)
app.jwt.private-key=./key/private_key.pem
app.jwt.public-key=./key/public_key.pem
app.password.private-key=./key/password_private.key
app.password.public-key=./key/password_public.key
