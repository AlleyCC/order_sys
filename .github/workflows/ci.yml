name: CI

on:
  push:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Generate RSA keys for tests
        run: |
          mkdir -p key
          openssl genrsa -out key/private_key.pem 2048
          openssl rsa -in key/private_key.pem -pubout -out key/public_key.pem
          openssl genrsa -out key/password_private.key 2048
          openssl rsa -in key/password_private.key -pubout -out key/password_public.key

      - name: Run tests
        run: ./mvnw --batch-mode test
